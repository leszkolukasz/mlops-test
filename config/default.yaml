# MLOps Pipeline Configuration

ray:
  num_cpus: null  # Use all available CPUs
  num_gpus: 0
  memory: null  # Use default memory allocation
  object_store_memory: null
  dashboard_host: "0.0.0.0"
  dashboard_port: 8265

data:
  batch_size: 1000
  train_test_split: 0.8
  validation_split: 0.2
  random_state: 42
  data_path: "data/"
  processed_data_path: "data/processed/"

training:
  model_type: "random_forest"
  hyperparameters:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    max_features: "sqrt"
  cross_validation_folds: 5
  max_trials: 10
  metric: "accuracy"
  model_registry_uri: "sqlite:///mlflow.db"

serving:
  host: "0.0.0.0"
  port: 8000
  num_replicas: 2
  max_concurrent_queries: 100
  model_name: "mlops-model"
  model_version: "latest"

monitoring:
  metrics_port: 9090
  log_level: "INFO"
  log_format: "json"
  drift_detection_threshold: 0.1
  performance_threshold: 0.05