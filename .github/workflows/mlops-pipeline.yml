name: MLOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        default: 'both'
        type: choice
        options:
          - ray
          - bentoml
          - both

env:
  PYTHON_VERSION: '3.10'

jobs:
  feature-engineering-and-training:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run feature engineering tests
      run: |
        python src/features/feature_engineering.py
    
    - name: Run model training tests
      run: |
        python src/models/train_model.py
    
    - name: Run Metaflow pipeline
      run: |
        python pipeline.py run --n-trials 5
      env:
        METAFLOW_USER: github-actions
    
    - name: Upload model artifacts
      uses: actions/upload-artifact@v3
      with:
        name: model-artifacts
        path: |
          models/
          mlruns/
        retention-days: 30
    
    - name: Upload pipeline artifacts
      uses: actions/upload-artifact@v3
      with:
        name: pipeline-outputs
        path: |
          .metaflow/
        retention-days: 7

  deploy-ray-serve:
    runs-on: ubuntu-latest
    needs: feature-engineering-and-training
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'ray' || github.event.inputs.deploy_target == 'both'))
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Download model artifacts
      uses: actions/download-artifact@v3
      with:
        name: model-artifacts
    
    - name: Deploy to server (Ray Serve)
      run: |
        chmod +x deployments/ray_serve/deploy.sh
        deployments/ray_serve/deploy.sh
      env:
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

  deploy-bentoml:
    runs-on: ubuntu-latest
    needs: feature-engineering-and-training
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'bentoml' || github.event.inputs.deploy_target == 'both'))
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Download model artifacts
      uses: actions/download-artifact@v3
      with:
        name: model-artifacts
    
    - name: Deploy to server (BentoML)
      run: |
        chmod +x deployments/bentoml/deploy.sh
        deployments/bentoml/deploy.sh
      env:
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

  notify:
    runs-on: ubuntu-latest
    needs: [feature-engineering-and-training, deploy-ray-serve, deploy-bentoml]
    if: always()
    
    steps:
    - name: Check deployment status
      run: |
        echo "Pipeline execution completed"
        echo "Training job: ${{ needs.feature-engineering-and-training.result }}"
        echo "Ray Serve deployment: ${{ needs.deploy-ray-serve.result }}"
        echo "BentoML deployment: ${{ needs.deploy-bentoml.result }}"
