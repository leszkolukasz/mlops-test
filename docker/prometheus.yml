global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'mlops-pipeline'
    static_configs:
      - targets: ['mlops-api:9090']
    scrape_interval: 5s
    metrics_path: /metrics

  - job_name: 'ray-serve'
    static_configs:
      - targets: ['mlops-api:8000']
    scrape_interval: 10s
    metrics_path: /metrics